<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 2rem; text-align: center; }
    header h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { margin-top: 0.5rem; opacity: 0.85; font-size: 1.1rem; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2rem; padding: 2rem; }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; padding: 1rem 2.5rem; font-size: 1.2rem; font-weight: 600; border-radius: 12px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6); }
    .btn:active { transform: translateY(0); }
    #message { font-size: 1.1rem; opacity: 0; transition: opacity 0.3s; }
    #message.show { opacity: 1; }
    footer { text-align: center; padding: 1.5rem; opacity: 0.4; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>🚀 Test Web</h1>
    <p>Deployed on Vercel via Hermes Agent</p>
  </header>
  <main>
    <button class="btn" id="actionBtn">¡Haz clic aquí!</button>
    <p id="message">🎉 ¡Funciona! Deploy exitoso en Vercel.</p>
  </main>
  <footer>Made with ❤️ by OWL & Hermes Agent</footer>
  <script>
    document.getElementById('actionBtn').addEventListener('click', function() {
      document.getElementById('message').classList.add('show');
      this.textContent = '✅ ¡Hecho!';
      this.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
    });
  </script>
</body>
</html>
